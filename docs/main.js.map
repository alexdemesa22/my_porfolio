<section class="section stats" #statsSection>
  <div class="container">
    <div class="stats-grid" appReveal>
      <div *ngFor="let stat of stats; let i = index" class="stat-card" appReveal [revealDelay]="i * 90">
        <div class="stat-icon">
          <i [class]="stat.icon"></i>
        </div>
        <div class="stat-value">
          {{ stat.value | number:'1.0-0' }}{{ stat.suffix }}
        </div>
        <div class="stat-label">
          {{ stat.label }}
        </div>
      </div>
    </div>
  </div>
</section>
